services:
  - type: web
    name: king-garant-bot
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npx pnpm@latest install && npx pnpm@latest --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
    healthCheckPath: /api/healthz
